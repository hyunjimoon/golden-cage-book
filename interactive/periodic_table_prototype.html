<title>창업소설의 주기율표 — 프로토타입</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#0a0e1a; --surface:#111827; --card:#1a2234;
    --text:#f0f2f5; --text2:#94a3b8; --dim:#64748b;
    --ch1:#C8A2C8; --ch2:#8B8C2A; --ch3:#5B9A8B; --ch4:#3B5998;
    --ch1bg:rgba(200,162,200,0.25); --ch2bg:rgba(139,140,42,0.25);
    --ch3bg:rgba(91,154,139,0.25); --ch4bg:rgba(59,89,152,0.25);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;overflow-x:hidden;}
  .header{text-align:center;padding:24px 16px 8px;}
  .header h1{font-size:1.5em;font-weight:700;letter-spacing:-0.5px;}
  .header .sub{font-size:0.85em;color:var(--dim);margin-top:4px;}

  /* ── 4-Column Summary ── */
  .summary{max-width:880px;margin:16px auto;padding:0 16px;}
  .summary h2{font-size:1em;font-weight:600;margin-bottom:10px;color:var(--text2);}
  .cols4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .col-card{border-radius:12px;padding:14px 10px;cursor:default;}
  .col-card h3{font-size:0.85em;font-weight:700;margin-bottom:2px;}
  .col-card .keyword{font-size:0.7em;color:var(--dim);margin-bottom:8px;}
  .col-card .verb{font-size:0.8em;font-weight:600;margin-bottom:8px;opacity:0.9;}
  .col-card .booklist{font-size:0.72em;line-height:1.8;}
  .col-card .booklist span{cursor:pointer;display:inline-block;padding:1px 4px;border-radius:3px;margin:1px 0;}
  .col-card .booklist span:hover{filter:brightness(1.5);}
  .col-card .booklist .feat{font-weight:700;}
  .c1{background:var(--ch1bg);border:1px solid rgba(200,162,200,0.3);color:var(--ch1);}
  .c2{background:var(--ch2bg);border:1px solid rgba(139,140,42,0.3);color:var(--ch2);}
  .c3{background:var(--ch3bg);border:1px solid rgba(91,154,139,0.3);color:var(--ch3);}
  .c4{background:var(--ch4bg);border:1px solid rgba(59,89,152,0.3);color:var(--ch4);}

  /* ── Mosaic ── */
  .mosaic-wrap{padding:8px 16px;}
  .mosaic{display:grid;grid-template-columns:repeat(22,1fr);gap:2px;max-width:880px;margin:0 auto;}
  .cell{
    aspect-ratio:1;border-radius:3px;cursor:pointer;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-family:'DM Mono',monospace;font-size:7px;color:rgba(255,255,255,0.3);
    transition:transform 0.15s,box-shadow 0.15s,opacity 0.3s;
  }
  .cell:hover{transform:scale(1.8);z-index:10;box-shadow:0 0 12px rgba(255,255,255,0.2);}
  @media(max-width:500px){.mosaic{grid-template-columns:repeat(11,1fr);} .cell{font-size:6px;min-width:24px;min-height:24px;}}
  .cell-empty{background:#0f1525;}
  .cell-ch1{background:var(--ch1bg);border:1px solid rgba(200,162,200,0.4);}
  .cell-ch2{background:var(--ch2bg);border:1px solid rgba(139,140,42,0.4);}
  .cell-ch3{background:var(--ch3bg);border:1px solid rgba(91,154,139,0.4);}
  .cell-ch4{background:var(--ch4bg);border:1px solid rgba(59,89,152,0.4);}
  .cell-selected{box-shadow:0 0 8px rgba(255,255,255,0.5)!important;transform:scale(1.5);z-index:11;}
  .cell.dimmed{opacity:0.15;}

  .legend{display:flex;justify-content:center;gap:16px;padding:8px 0;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);cursor:pointer;}
  .legend-item:hover{color:var(--text);}
  .legend-dot{width:10px;height:10px;border-radius:2px;}

  /* ── Panel ── */
  .panel{max-width:880px;margin:16px auto;padding:0 16px;display:none;}
  .panel.active{display:block;}
  .panel-card{background:var(--card);border-radius:16px;padding:24px;margin-bottom:16px;}
  .panel-title{font-size:1.2em;font-weight:700;margin-bottom:4px;}
  .panel-cover{float:right;margin:0 0 12px 16px;width:120px;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.4);transition:opacity 0.3s;}
  .panel-author{font-size:0.85em;color:var(--dim);margin-bottom:16px;}
  .panel-tragedy{font-size:0.95em;line-height:1.7;color:var(--text2);margin-bottom:16px;padding:12px;background:var(--surface);border-radius:10px;border-left:3px solid var(--ch1);}
  .panel-quote{font-style:italic;font-size:0.85em;color:var(--dim);margin-bottom:16px;}
  .info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;}
  .info-card{padding:14px;background:var(--surface);border-radius:10px;text-align:center;}
  .info-card h4{font-size:0.7em;color:var(--dim);letter-spacing:1px;margin-bottom:6px;}
  .info-card .val{font-size:1.05em;font-weight:600;}
  .verb-box{text-align:center;padding:14px;background:var(--surface);border-radius:10px;margin-bottom:16px;font-size:1.1em;font-weight:700;}
  .debt-section{margin-bottom:16px;}
  .debt-bar-wrap{display:flex;align-items:center;gap:8px;margin:6px 0;}
  .debt-label{font-size:0.8em;min-width:100px;color:var(--dim);}
  .debt-bar{height:8px;border-radius:4px;transition:width 0.5s;}
  .debt-score{font-size:0.85em;font-weight:600;min-width:30px;}

  .my-table{max-width:880px;margin:16px auto;padding:0 16px;}
  .my-table h3{font-size:1em;margin-bottom:8px;}
  .my-count{font-family:'DM Mono',monospace;font-size:0.85em;color:var(--dim);}
  .my-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .my-chip{padding:4px 10px;border-radius:6px;font-size:0.75em;font-weight:600;}
  .prompt-box{max-width:880px;margin:8px auto 24px;padding:0 16px;}
  .prompt{background:var(--card);border-radius:12px;padding:16px;font-size:0.85em;color:var(--text2);text-align:center;}

  @media(max-width:600px){
    .cols4{grid-template-columns:repeat(2,1fr);}
    .info-grid{grid-template-columns:1fr;}
  }
</style>
</head>

// ═══ 4-Column Summary ═══
(function buildSummary(){
  const wrap = document.getElementById('cols4');
  const icons = {1:'🪞',2:'🔭',3:'💒',4:'⏱️'};
  for(let ch=1;ch<=4;ch++){
    const c = CH[ch];
    const books = DATA.filter(b=>b.ch===ch);
    const card = document.createElement('div');
    card.className = `col-card c${ch}`;
    let html = `<h3>${icons[ch]} ${c.borrowed}</h3>`;
    html += `<div class="keyword">${c.line}</div>`;
    html += `<div class="verb">→ ${c.verb}</div>`;
    html += '<div class="booklist">';
    books.forEach(b=>{
      const cls = b.feat ? 'feat' : '';
      html += `<span class="${cls}" onclick="showPanel(DATA.find(x=>x.vol===${b.vol}))">${b.vol} ${b.title}</span><br>`;
    });
    html += '</div>';
    card.innerHTML = html;
    wrap.appendChild(card);
  }
})();

// ═══ 484 Mosaic ═══
const mosaic = document.getElementById('mosaic');
const analyzed = new Set();
for(let i=1;i<=484;i++){
  const cell = document.createElement('div');
  cell.className = 'cell';
  const d = DATA.find(x=>x.vol===i);
  if(d){
    cell.classList.add(`cell-ch${d.ch}`);
    cell.textContent = i;
    cell.dataset.vol = i;
    cell.onclick = ()=> showPanel(d);
    if(d.feat) cell.style.boxShadow='0 0 6px rgba(255,255,255,0.3)';
  } else {
    cell.classList.add('cell-empty');
    cell.textContent = i;
    cell.dataset.vol = i;
    cell.style.cursor = 'pointer';
    cell.onclick = ()=>{
      const c = typeof COVERS!=='undefined' && COVERS[i];
      if(c){
        const p = document.getElementById('panel');
        p.classList.add('active');
        document.getElementById('pTitle').textContent = i+'. '+c.title;
        document.getElementById('pTitle').style.color = '#64748b';
        document.getElementById('pAuthor').textContent = '(분석 대기)';
        document.getElementById('pTragedy').textContent = '';
        document.getElementById('pQuote').textContent = '';
        document.getElementById('pBorrowed').textContent = '—';
        document.getElementById('pLost').textContent = '—';
        document.getElementById('pCage').textContent = '—';
        document.getElementById('pVerb').textContent = '빈칸이 다음 책이다';
        document.getElementById('pVerb').style.color = '#64748b';
        document.getElementById('pMemo').textContent = '';
        ['d1','d2','d3','d4'].forEach((id)=>{document.getElementById(id).style.width='0%';document.getElementById('ds'+(parseInt(id[1])).toString()).textContent='';});
        const coverEl = document.getElementById('pCover');
        coverEl.src=c.url;coverEl.alt=c.title;coverEl.style.display='block';
        coverEl.onerror=function(){this.style.display='none';};
      }
    };
  }
  mosaic.appendChild(cell);
}

// ═══ Debt Scoring ═══
function scoreDebt(d) {
  let s = [15,15,15,15];
  s[d.ch-1] += 60;
  const mx = Math.max(...s);
  return s.map(v=>Math.round(v/mx*100));
}

// ═══ Panel ═══
function showPanel(d){
  document.querySelectorAll('.cell-selected').forEach(c=>c.classList.remove('cell-selected'));
  const sel = document.querySelector(`.cell[data-vol="${d.vol}"]`);
  if(sel) sel.classList.add('cell-selected');

  const p = document.getElementById('panel');
  p.classList.add('active');

  const c = CH[d.ch];
  const chNames = {1:'🪞 거울새장',2:'🔭 망원경새장',3:'💒 스테인드글라스새장',4:'⏱️ 시계새장'};
  const chColors = {1:'var(--ch1)',2:'var(--ch2)',3:'var(--ch3)',4:'var(--ch4)'};

  const coverEl = document.getElementById('pCover');
  const coverData = typeof COVERS!=='undefined' && COVERS[d.vol];
  if(coverData){coverEl.src=coverData.url;coverEl.alt=d.title;coverEl.style.display='block';coverEl.onerror=function(){this.style.display='none';};}
  else{coverEl.style.display='none';}

  document.getElementById('pTitle').textContent = `${d.vol}. ${d.title}`;
  document.getElementById('pTitle').style.color = chColors[d.ch];
  document.getElementById('pAuthor').textContent = `${d.author} — ${chNames[d.ch]}`;
  document.getElementById('pTragedy').textContent = d.tragedy||'(분석 대기)';
  document.getElementById('pTragedy').style.borderColor = chColors[d.ch];
  document.getElementById('pQuote').textContent = d.quote ? `"${d.quote}"` : '';
  document.getElementById('pBorrowed').textContent = c.borrowed;
  document.getElementById('pBorrowed').style.color = chColors[d.ch];
  document.getElementById('pLost').textContent = c.lost;
  document.getElementById('pCage').textContent = c.cage;
  document.getElementById('pVerb').textContent = c.verb;
  document.getElementById('pVerb').style.color = chColors[d.ch];
  document.getElementById('pMemo').textContent = d.memo ? `💡 ${d.memo}` : '';

  const scores = scoreDebt(d);
  ['d1','d2','d3','d4'].forEach((id,i)=>{
    document.getElementById(id).style.width = scores[i]+'%';
    document.getElementById('ds'+[i+1]).textContent = scores[i]+'%';
  });

  analyzed.add(d.vol);
  updateMyTable();
}

function updateMyTable(){
  document.getElementById('myCount').textContent = `${analyzed.size}/484`;
  const grid = document.getElementById('myGrid');
  grid.innerHTML = '';
  const chColors = {1:'var(--ch1)',2:'var(--ch2)',3:'var(--ch3)',4:'var(--ch4)'};
  [...analyzed].sort((a,b)=>a-b).forEach(vol=>{
    const d = DATA.find(x=>x.vol===vol);
    if(!d)return;
    const chip = document.createElement('span');
    chip.className = 'my-chip';
    chip.style.cssText = `background:${chColors[d.ch].replace('var(--ch','rgba(').replace(')',',0.2)')};color:${chColors[d.ch]}`;
    chip.textContent = `${vol} ${d.title}`;
    grid.appendChild(chip);
  });
}

function filterCh(ch){
  document.querySelectorAll('.cell').forEach(c=>{
    if(ch===0){ c.classList.remove('dimmed'); return; }
    const d = DATA.find(x=>x.vol===parseInt(c.dataset.vol));
    if(d && d.ch===ch) c.classList.remove('dimmed');
    else c.classList.add('dimmed');
  });
}
