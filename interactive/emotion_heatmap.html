<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>황금새장을열다 — 감정 벡터 히트맵</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap');
  :root { --bg:#0a0e1a; --surface:#111827; --card:#1a2234; --text:#f0f2f5; --dim:#64748b; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.6;padding:20px;}

  .header{text-align:center;margin-bottom:20px;}
  .header h1{font-size:1.3em;font-weight:700;}
  .header .sub{font-size:0.8em;color:var(--dim);margin-top:4px;}

  .controls{display:flex;justify-content:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .emo-btn{padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:var(--surface);color:var(--dim);cursor:pointer;font-size:0.8em;font-family:inherit;transition:all 0.2s;}
  .emo-btn.active{color:#fff;border-color:currentColor;}

  .legend{display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:16px;font-size:0.75em;color:var(--dim);}
  .legend-bar{width:200px;height:12px;border-radius:6px;background:linear-gradient(to right,#2166ac,#4393c3,#92c5de,#d1e5f0,#f7f7f7,#fddbc7,#f4a582,#d6604d,#b2182b);}

  .scene{margin-bottom:24px;background:var(--card);border-radius:12px;overflow:hidden;}
  .scene-header{display:flex;align-items:stretch;}
  .scene-heatmap{width:80px;min-height:60px;flex-shrink:0;}
  .scene-heatmap canvas{width:80px;height:100%;}
  .scene-content{flex:1;padding:12px 16px;}
  .scene-label{font-size:0.7em;color:var(--dim);margin-bottom:4px;}
  .scene-speaker{font-weight:700;font-size:0.85em;margin-bottom:4px;}
  .scene-text{font-family:'DM Mono',monospace;font-size:0.82em;line-height:2;letter-spacing:0.3px;}
  .scene-text span{padding:1px 2px;border-radius:2px;transition:background 0.3s;}

  .ch-tabs{display:flex;justify-content:center;gap:4px;margin-bottom:16px;}
  .ch-tab{padding:8px 18px;border-radius:8px 8px 0 0;cursor:pointer;font-size:0.85em;font-weight:600;border:none;color:var(--dim);background:var(--surface);}
  .ch-tab.active{color:#fff;}
  .ch-tab[data-ch="1"].active{background:#C8A2C8;}
  .ch-tab[data-ch="2"].active{background:#8B8C2A;}
  .ch-tab[data-ch="3"].active{background:#5B9A8B;}
  .ch-tab[data-ch="4"].active{background:#3B5998;}

  .source{text-align:center;margin-top:16px;font-size:0.7em;color:var(--dim);}
  .source a{color:var(--dim);}
</style>
</head>
<body>

<div class="header">
  <h1>황금새장을열다 — 감정 벡터 히트맵</h1>
  <div class="sub">각 토큰의 감정 벡터 활성도를 색으로 표현 — Anthropic (2026) 방법론 적용</div>
</div>

<div class="ch-tabs">
  <button class="ch-tab active" data-ch="1" onclick="setCh(1)">1장 🪞</button>
  <button class="ch-tab" data-ch="2" onclick="setCh(2)">2장 🔭</button>
  <button class="ch-tab" data-ch="3" onclick="setCh(3)">3장 💒</button>
  <button class="ch-tab" data-ch="4" onclick="setCh(4)">4장 ⏱️</button>
</div>

<div class="controls" id="controls"></div>

<div class="legend">
  <span>-1 (억제)</span>
  <div class="legend-bar"></div>
  <span>+1 (활성)</span>
</div>

<div id="scenes"></div>

<div class="source">
  방법론: <a href="https://transformer-circuits.pub/2026/emotions/index.html" target="_blank">Anthropic — Emotion concepts in LLMs (2026)</a><br>
  시각화는 실제 벡터 측정이 아닌 텍스트 기반 추정치입니다.
</div>

      }
    },
    { speaker:'다', label:'3장 메타 — 나도 보균자',
      tokens: ['나도','보균자였던 적이','있지','않을까.'],
      vectors: {
        desperate:     [0.4, 0.3, 0.5, 0.6],

let currentCh = 1;
let currentEmo = 'desperate';

// Color scale: blue(-1) → white(0) → red(+1)
function valToColor(v) {
  v = Math.max(-1, Math.min(1, v));
  if (v === 0) return 'rgba(247,247,247,0.1)';
  if (v > 0) {
    const r = Math.round(247 - v * (247-178));
    const g = Math.round(247 - v * (247-24));
    const b = Math.round(247 - v * (247-43));
    return `rgba(${r},${g},${b},${0.3 + v*0.7})`;
  } else {
    const av = Math.abs(v);
    const r = Math.round(247 - av * (247-33));
    const g = Math.round(247 - av * (247-102));
    const b = Math.round(247 - av * (247-172));
    return `rgba(${r},${g},${b},${0.3 + av*0.7})`;
  }
}

function buildControls() {
  const c = document.getElementById('controls');
  c.innerHTML = EMOTIONS.map(e =>
    `<button class="emo-btn ${e.id===currentEmo?'active':''}" style="${e.id===currentEmo?'color:'+e.color+';border-color:'+e.color:''}" onclick="setEmo('${e.id}')">${e.kr}</button>`
  ).join('');
}

function setEmo(emo) {
  currentEmo = emo;
  buildControls();
  renderScenes();
}

function setCh(ch) {
  currentCh = ch;
  document.querySelectorAll('.ch-tab').forEach(t => t.classList.toggle('active', parseInt(t.dataset.ch)===ch));
  renderScenes();
}

function renderScenes() {
  const scenes = CHAPTERS[currentCh];
  const container = document.getElementById('scenes');
  container.innerHTML = '';

  scenes.forEach((scene, si) => {
    const div = document.createElement('div');
    div.className = 'scene';

    // Heatmap (left side) — all 6 emotions × tokens
    const heatW = 80;
    const tokenCount = scene.tokens.filter(t => t !== '\n').length;
    const heatH = Math.max(60, tokenCount * 6);

    // Text with colored tokens (right side)
    let textHtml = '';
    scene.tokens.forEach((tok, ti) => {
      if (tok === '\n') { textHtml += '<br>'; return; }
      const v = scene.vectors[currentEmo][ti];
      const bg = valToColor(v);
      textHtml += `<span style="background:${bg}" title="${currentEmo}: ${v.toFixed(2)}">${tok}</span> `;
    });

    // Mini heatmap canvas
    const canvasId = `hm${si}`;

    div.innerHTML = `
      <div class="scene-header">
        <div class="scene-heatmap"><canvas id="${canvasId}" width="80" height="${heatH}"></canvas></div>
        <div class="scene-content">
          <div class="scene-label">${scene.label}</div>
          <div class="scene-speaker">${scene.speaker === '다' ? '다(DA)' : '세(SE)'}:</div>
          <div class="scene-text">${textHtml}</div>
        </div>
      </div>
    `;
    container.appendChild(div);

    // Draw mini heatmap
    setTimeout(() => {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const realTokens = scene.tokens.map((t,i) => ({t,i})).filter(x => x.t !== '\n');
      const cellW = heatW / EMOTIONS.length;
      const cellH = heatH / realTokens.length;

      realTokens.forEach((tok, row) => {
        EMOTIONS.forEach((emo, col) => {
          const v = scene.vectors[emo.id][tok.i];
          ctx.fillStyle = valToColor(v);
          ctx.fillRect(col * cellW, row * cellH, cellW - 0.5, cellH - 0.5);
        });
      });

      // Highlight current emotion column
      const emoIdx = EMOTIONS.findIndex(e => e.id === currentEmo);
      ctx.strokeStyle = EMOTIONS[emoIdx].color;
      ctx.lineWidth = 2;
      ctx.strokeRect(emoIdx * cellW, 0, cellW, heatH);
    }, 10);
  });
}

buildControls();
renderScenes();
</script>
</body>
</html>
