<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나는 어느 새장에 있는가</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:#060910;color:#e2e8f0;min-height:100vh;}
  .page{max-width:480px;margin:0 auto;padding:48px 20px 64px;}
  .back{font-size:12px;color:#3a4a5a;text-decoration:none;display:inline-block;margin-bottom:36px;}
  .back:hover{color:#e2e8f0;}
  h1{font-size:1.4em;font-weight:700;text-align:center;margin-bottom:6px;}
  .sub{font-size:13px;color:#5a6a7a;text-align:center;margin-bottom:40px;}

  /* 2x2 grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;border:1px solid rgba(255,255,255,0.06);margin-bottom:8px;}
  .cage{padding:28px 18px;cursor:pointer;transition:background 0.3s;border:1px solid rgba(255,255,255,0.04);position:relative;}
  .cage .ch{position:absolute;top:10px;right:12px;font-size:11px;color:#2a3a4a;}
  .cage .icon{font-size:22px;margin-bottom:6px;}
  .cage .name{font-size:14px;font-weight:600;margin-bottom:4px;}
  .cage .debt{font-size:12px;color:#5a6a7a;}
  .cage.active{background:rgba(255,255,255,0.05);}
  .cage.pair{background:rgba(255,255,255,0.08);outline:2px solid rgba(255,255,255,0.15);outline-offset:-2px;}

  /* 쌍대 표시 */
  .pair-label{display:flex;justify-content:space-between;font-size:10px;color:#2a3a4a;padding:0 4px;margin-bottom:2px;}
  .pair-row{display:flex;align-items:center;justify-content:center;padding:4px 0;}
  .pair-line{font-size:10px;color:#2a3a4a;letter-spacing:2px;}

  /* 범례 */
  .legend{text-align:center;font-size:10px;color:#2a3a4a;margin:12px 0 28px;letter-spacing:1px;}

  /* 결과 */
  .result{overflow:hidden;max-height:0;opacity:0;transition:all 0.4s;margin-bottom:24px;}
  .result.show{max-height:250px;opacity:1;}
  .result-box{padding:20px;background:#0c1018;border-radius:8px;border:1px solid rgba(255,255,255,0.05);}
  .r-pair{font-size:14px;font-weight:600;margin-bottom:10px;}
  .r-warn{font-size:13px;margin-bottom:8px;}
  .r-dilemma{font-size:12px;color:#5a6a7a;margin-bottom:8px;}
  .r-flow{font-size:11px;color:#2a3a4a;}

  .links{display:flex;gap:16px;flex-wrap:wrap;}
  .links a{font-size:12px;color:#3a4a5a;text-decoration:none;}
  .links a:hover{color:#e2e8f0;}
  .footer{text-align:center;padding:48px 20px;font-size:12px;color:#1a2030;}
</style>
</head>
<body>
<div class="page">
  <a class="back" href="../">← 대문으로</a>
  <h1>나는 어느 새장에 있는가?</h1>
  <p class="sub">새장을 누르세요.</p>

  <div class="pair-label"><span>━ 쌍대: 같은 실수의 앞뒤</span><span></span></div>
  <div class="grid" id="grid">
    <div class="cage" data-ch="1" data-pair="2">
      <div class="ch">1장</div>
      <div class="icon">🪞</div>
      <div class="name">거울</div>
      <div class="debt">원하니까 그렇게 보인다</div>
    </div>
    <div class="cage" data-ch="2" data-pair="1">
      <div class="ch">2장</div>
      <div class="icon">🔭</div>
      <div class="name">망원경</div>
      <div class="debt">보이니까 포기한다</div>
    </div>
    <div class="cage" data-ch="3" data-pair="4">
      <div class="ch">3장</div>
      <div class="icon">💒</div>
      <div class="name">스테인드글라스</div>
      <div class="debt">맞으니까 반복한다</div>
    </div>
    <div class="cage" data-ch="4" data-pair="3">
      <div class="ch">4장</div>
      <div class="icon">⏱️</div>
      <div class="name">시계</div>
      <div class="debt">됐으니까 멈춘다</div>
    </div>
  </div>
  <div class="legend">━ 가로 = 쌍대 &nbsp;&nbsp; │ 세로 = 순환</div>

  <div class="result" id="result">
    <div class="result-box" id="rBox">
      <div class="r-pair" id="rPair"></div>
      <div class="r-warn" id="rWarn"></div>
      <div class="r-dilemma" id="rDilemma"></div>
      <div class="r-flow" id="rFlow"></div>
    </div>
  </div>

  <div class="links">
    <a href="emotion_trajectory.html">감정 궤적 →</a>
    <a href="symbols.html">12상징 →</a>
    <a href="periodic_table_prototype.html">484권 빚 지도 →</a>
  </div>
</div>
<div class="footer">약의 과잉이 짝의 병이 된다.</div>

<script>
const D = {
  1:{pair:'🪞↔🔭',warn:'과잉 솔직은 안개가 된다.',dilemma:'유연성 vs 효율 — 원하는 것과 보이는 것 사이',flow:'→ 2장을 함께 읽으세요',color:'155,122,139'},
  2:{pair:'🔭↔🪞',warn:'과잉 질주는 욕망이 된다.',dilemma:'유연성 vs 효율 — 보이는 것과 원하는 것 사이',flow:'→ 1장을 함께 읽으세요',color:'122,128,104'},
  3:{pair:'💒↔⏱️',warn:'과잉 교정은 마비가 된다.',dilemma:'착취 vs 탐색 — 맞는 것과 새로운 것 사이',flow:'→ 4장을 함께 읽으세요',color:'74,122,107'},
  4:{pair:'⏱️↔💒',warn:'과잉 해체는 맹신이 된다.',dilemma:'착취 vs 탐색 — 된 것과 다음 것 사이',flow:'→ 3장을 함께 읽으세요',color:'90,138,154'}
};
const cages=document.querySelectorAll('.cage');
cages.forEach(c=>{
  c.addEventListener('click',()=>{
    const ch=c.dataset.ch, p=c.dataset.pair, d=D[ch];
    cages.forEach(x=>{x.classList.remove('active','pair');x.querySelector('.name').style.color='';});
    c.classList.add('active');
    c.querySelector('.name').style.color=`rgb(${d.color})`;
    const pc=document.querySelector(`.cage[data-ch="${p}"]`);
    pc.classList.add('pair');
    pc.querySelector('.name').style.color=`rgb(${D[p].color})`;
    document.getElementById('rPair').textContent=d.pair;
    document.getElementById('rPair').style.color=`rgb(${d.color})`;
    document.getElementById('rWarn').textContent=d.warn;
    document.getElementById('rDilemma').textContent=d.dilemma;
    document.getElementById('rFlow').textContent=d.flow;
    document.getElementById('rBox').style.borderColor=`rgba(${d.color},0.2)`;
    document.getElementById('result').classList.add('show');
  });
});
</script>
</body>
</html>
