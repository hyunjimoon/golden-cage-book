<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>황금새장을열다</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=DM+Mono:wght@400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:#090c15;color:#e8eaf0;-webkit-font-smoothing:antialiased;}

  .page{max-width:560px;margin:0 auto;padding:64px 24px 48px;}

  /* hero */
  h1{font-size:1.5em;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px;}
  .eq{font-family:'DM Mono',monospace;font-size:12px;color:#6b7a8d;margin-bottom:48px;}

  /* 2×2 map */
  .map{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,0.04);border-radius:12px;overflow:hidden;margin-bottom:8px;}
  .cell{background:#0e1220;padding:20px;text-decoration:none;color:#e8eaf0;transition:background 0.2s;}
  .cell:hover{background:#141b2d;}
  .cell .ch{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:6px;}
  .cell .novel{font-size:13px;font-weight:300;color:#8899aa;margin-bottom:10px;}
  .cell .cure{font-size:12px;font-weight:700;}
  .c1 .ch{color:#C8A2C8;} .c1 .cure{color:#C8A2C8;}
  .c2 .ch{color:#8B8C2A;} .c2 .cure{color:#8B8C2A;}
  .c3 .ch{color:#5B9A8B;} .c3 .cure{color:#5B9A8B;}
  .c4 .ch{color:#3B5998;} .c4 .cure{color:#3B5998;}
  .cycle{text-align:center;font-size:11px;color:#3a4050;margin-bottom:48px;}

  /* links */
  .links{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:64px;}
  .links a{font-size:12px;color:#5a6a7a;text-decoration:none;transition:color 0.2s;}
  .links a:hover{color:#e8eaf0;}

  /* tetrahedron */
  .tetra{text-align:center;margin-bottom:16px;}
  .tetra svg{width:200px;opacity:0.35;transition:opacity 0.6s;}
  .tetra svg:hover{opacity:0.8;}
  .end{text-align:center;font-size:12px;color:#3a4050;font-weight:300;}
</style>
</head>
<body>
<div class="page">

  <h1>황금새장을열다</h1>
  <div class="eq">dG/dF = (+)(−) = (−)</div>

  <div class="map">
    <a class="cell c1" href="interactive/reader.html?file=ch1_mirror_cage">
      <div class="ch">1 거울</div>
      <div class="novel">마담 보바리</div>
      <div class="cure">장부를 펴라</div>
    </a>
    <a class="cell c2" href="interactive/reader.html?file=ch2_telescope_cage">
      <div class="ch">2 망원경</div>
      <div class="novel">표범</div>
      <div class="cure">순서를 타라</div>
    </a>
    <a class="cell c4" href="interactive/reader.html?file=ch4_clock_cage">
      <div class="ch">4 시계</div>
      <div class="novel">방드르디</div>
      <div class="cure">다음 불을 피워라</div>
    </a>
    <a class="cell c3" href="interactive/reader.html?file=ch3_stained_glass_cage">
      <div class="ch">3 스테인드글라스</div>
      <div class="novel">페스트</div>
      <div class="cure">확신을 교정하라</div>
    </a>
  </div>
  <div class="cycle">1장의 약이 2장의 병이 된다</div>

  <div class="links">
    <a href="interactive/reader.html?file=ch0_prologue">프롤로그</a>
    <a href="interactive/reader.html?file=ch5_epilogue">에필로그</a>
    <a href="interactive/periodic_table_prototype.html">주기율표</a>
    <a href="interactive/emotion_trajectory.html">감정 궤적</a>
    <a href="interactive/compare.html">구조 비교</a>
    <a href="interactive/readers.html">독자 7명</a>
    <a href="https://github.com/hyunjimoon/golden-cage-book">GitHub</a>
  </div>

  <div class="end">빌린 것을 갚으면 새장이 둥지가 된다</div>

</div>
</body>
</html>
